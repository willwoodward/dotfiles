# Mouse support
set -g mouse on

# Better terminal behavior
set -g focus-events on
set -sg escape-time 10

# Scroll pane under cursor
bind -n WheelUpPane \
  if-shell -F -t= '#{mouse_any_flag}' \
    'send-keys -M' \
    'copy-mode -e -t='

bind -n WheelDownPane \
  select-pane -t= \; send-keys -M

# Change the prefix to Ctrl+a (instead of Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Change horizontal and vertical pane keybinds to "h" and "v"
bind v split-window -v
bind h split-window -h

# Change the status bar appearance
set -g status-bg white
set -g status-fg black

# Change the pane colours
set -g pane-border-style "fg=color8"
set -g pane-active-border-style "fg=white"

